<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ระบบจัดการสต๊อกสินค้า – บันทึกเข้า ส่งออก สินค้าตีกลับ</title>
    <!-- PWA Manifest & App Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#6366f1" />
    <!-- PDF.js library for client-side multi-page PDF rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('PWA Service Worker registered successfully:', reg.scope);
              
              // Detect update when service worker is found
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('New service worker content is available; please refresh.');
                        window.dispatchEvent(new CustomEvent('pwa-update-available'));
                      }
                    }
                  };
                }
              };

              // Force browser to check for service worker updates immediately on page load
              reg.update().catch(() => {});
            })
            .catch((err) => {
              console.error('PWA Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
